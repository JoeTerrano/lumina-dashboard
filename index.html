<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-overlay"></div>
    
    <button id="settings-toggle" class="settings-btn" aria-label="Settings">
        <i data-lucide="settings"></i>
    </button>

    <div id="settings-modal" class="modal hidden">
        <div class="modal-content glass-panel">
            <header class="modal-header">
                <h2>Settings</h2>
                <button id="close-settings" class="close-btn">&times;</button>
            </header>
            
            <section class="settings-section">
                <h3>Location & Units</h3>
                <div class="input-group">
                    <label for="location-input">City Name</label>
                    <input type="text" id="location-input" placeholder="e.g. New York">
                </div>
                <div class="toggle-group">
                    <div class="toggle-item">
                        <span>Temperature Unit</span>
                        <select id="temp-unit">
                            <option value="C">Celsius (°C)</option>
                            <option value="F">Fahrenheit (°F)</option>
                        </select>
                    </div>
                    <div class="toggle-item">
                        <span>Time Format</span>
                        <select id="time-format">
                            <option value="24">24-Hour</option>
                            <option value="12">12-Hour</option>
                        </select>
                    </div>
                </div>
            </section>

            <section class="settings-section">
                <h3>Launchpad Links (Max 8)</h3>
                <div id="links-list" class="links-manager">
                    <!-- Links will be added here dynamically -->
                </div>
                <div class="add-link-form">
                    <input type="text" id="new-link-name" placeholder="Name (e.g. GitHub)">
                    <input type="text" id="new-link-url" placeholder="URL (e.g. https://github.com)">
                    <button id="add-link-btn" class="primary-btn">Add Link</button>
                </div>
            </section>
        </div>
    </div>

    <main class="dashboard">
        <header class="header">
            <h1 id="greeting">Good Morning</h1>
            <div id="clock" class="clock">00:00:00</div>
            <nav id="launchpad" class="launchpad">
                <!-- Initial links from earlier if needed, but we'll render dynamically -->
            </nav>
        </header>

        <div class="widgets-container">
            <section class="widgets">
                <div class="glass-panel focus-widget">
                    <h2>What is your focus today?</h2>
                    <ul id="focus-list" class="focus-list"></ul>
                    <div id="focus-input-container">
                        <input type="text" id="focus-input" placeholder="Enter a task (max 5)..." aria-label="Daily Goal">
                    </div>
                </div>

                <div class="glass-panel weather-widget">
                    <h3>Weather</h3>
                    <div class="weather-content">
                        <span id="location-display">New York</span>
                        <span id="temp">22°C</span>
                        <span id="condition">Partly Cloudy</span>
                    </div>
                </div>

                <div class="glass-panel quote-widget">
                    <button id="refresh-quote-btn" class="icon-btn" aria-label="Refresh Quote">
                        <i data-lucide="refresh-cw"></i>
                    </button>
                    <div id="quote-content">
                        <p id="quote">"Creativity is intelligence having fun."</p>
                        <cite id="quote-author">— Albert Einstein</cite>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
      lucide.createIcons();
    </script>
    <script src="app.js"></script>
</body>
</html>
